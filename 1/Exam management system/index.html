<!DOCTYPE html>
<html>
<head>
    <title>Exam Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 bg-dark text-white p-3 sidebar">
            <h3>Admin</h3>

            <p>Dashboard</p>
            <p>Students</p>
            <p>Exams</p>
            <p>Results</p>
        </div>

        <!-- Main -->
        <div class="col-md-10 p-4">

            <h2>Exam Management System</h2>

            <!-- Cards -->
            <div class="row mt-4">

                <div class="col-md-4">
                    <div class="card bg-primary text-white p-3">
                        <h5>Total Students</h5>
                        <h3>500</h3>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card bg-success text-white p-3">
                        <h5>Total Exams</h5>
                        <h3>20</h3>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card bg-danger text-white p-3">
                        <h5>Pending Exams</h5>
                        <h3>5</h3>
                    </div>
                </div>

            </div>

            <!-- Table -->
            <div class="mt-4">

                <table class="table table-bordered">

                    <tr class="table-dark">
                        <th>ID</th>
                        <th>Name</th>
                        <th>Subject</th>
                        <th>Marks</th>
                    </tr>

                    <tr>
                        <td>1</td>
                        <td>Jayesh</td>
                        <td>Java</td>
                        <td>100</td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>Rohit</td>
                        <td>Python</td>
                        <td>92</td>
                    </tr>

                    <tr>
                        <td>3</td>
                        <td>Virat</td>
                        <td>DBMS</td>
                        <td>49</td>
                    </tr>

                </table>

            </div>

            <button class="btn btn-primary" onclick="showMsg()">
                Click
            </button>

        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
