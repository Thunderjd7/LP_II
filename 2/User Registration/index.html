<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h2 class="mb-4">User Registration</h2>

        <input type="text" id="name" class="form-control mb-3" placeholder="Enter Name">

        <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email">

        <input type="text" id="course" class="form-control mb-3" placeholder="Enter Course">

        <button class="btn btn-primary" onclick="saveData()">
            Register
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
